name = "swazz-api"
main = "src/index.ts"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "swazz.secmy.app/api*", zone_name = "secmy.app" }
]
[[durable_objects.bindings]]
name = "SWAZZ_DO"
class_name = "SwazzContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SwazzContainer"]

[[containers]]
class_name = "SwazzContainer"
image = "../container/Dockerfile"

  [containers.instance_type]
  vcpu = 4
  memory_mib = 12288
  disk_mb = 20480

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
