apiVersion: v1
kind: Service
metadata:
  name: {{ include "swazz.fullname" . }}-edge
  labels:
    {{- include "swazz.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  type: {{ .Values.edge.service.type }}
  ports:
    - port: {{ .Values.edge.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "swazz.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: edge
