services:
  backend:
    build:
      context: .
      dockerfile: packages/edge/Dockerfile
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    volumes:
      - ./packages/edge/.wrangler:/app/packages/edge/.wrangler
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  runner:
    build:
      context: ./packages/container
      dockerfile: Dockerfile.cli
    depends_on:
      - backend
    command: ["run-agent", "--coordinator", "ws://backend:8080/api/runners/connect", "--token", "swazz_live_citoken1234567890", "--dangerous-no-container"]
    restart: unless-stopped
