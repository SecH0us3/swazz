name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      # v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # v4.0.1
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            frontend:
              - 'packages/web/**'
              - 'package.json'
              - 'package-lock.json'
            backend:
              - 'packages/container/**'

  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '25.9.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --workspace=packages/web

  test-backend:
    name: Test Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        # v6.4.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.4'
          cache-dependency-path: packages/container/go.sum

      - name: Run tests
        run: cd packages/container && go test -v ./...

  test-e2e:
    name: Run E2E Playwright Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '25.9.0'
          cache: 'npm'

      - name: Set up Go
        # v6.4.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.4'
          cache-dependency-path: packages/container/go.sum

      - name: Install root dependencies
        run: npm install

      - name: Install demo dependencies
        run: cd demo && npm install

      - name: Build web assets
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Apply coordinator D1 migrations locally
        run: npx --workspace=packages/edge wrangler d1 migrations apply swazz_db --local

      - name: Start Vulnerable Demo API
        run: npx --prefix demo wrangler dev --port 8788 &

      - name: Start Edge Coordinator API
        run: npm run dev:backend &

      - name: Start Vite Frontend
        run: npm run dev:frontend &

      - name: Start Go Runner Agent
        run: |
          cd packages/container && go run . generate-keys
          cd ../..
          go run ./packages/container run-agent --coordinator ws://127.0.0.1:8787/api/runners/connect --dangerous-no-container --name ci-runner &

      - name: Wait for services to be ready
        run: sleep 8

      - name: Run Playwright tests
        run: npm run test:e2e

