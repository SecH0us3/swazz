name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      # v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # v4.0.1
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        with:
          filters: |
            frontend:
              - 'packages/web/**'
              - 'packages/edge/**'
              - 'demo/**'
              - 'package.json'
              - 'package-lock.json'
            backend:
              - 'packages/container/**'

  release-binaries:
    name: Build and Release Binaries
    needs: changes
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        # v6.4.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.26.4"
          cache-dependency-path: packages/container/go.sum

      - name: Build Binaries
        run: |
          cd packages/container
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o swazz-engine-linux-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o swazz-engine-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o swazz-engine-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o swazz-engine-windows-amd64.exe .

      - name: Lowercase repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Calculate Docker Tag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DOCKER_TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create Release
        # v3.0.0
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.ref_name == 'master' && format('rev-{0}', github.sha) || github.ref_name }}
          name: ${{ github.ref_name == 'master' && format('Commit {0}', github.sha) || github.ref_name }}
          body: |
            ## Docker Images

            We publish two Docker images for each release, including the `latest` tag.

            ### Web Dashboard & API Server
            Pushed to [ghcr.io/sech0us3/swazz](https://github.com/SecH0us3/swazz/pkgs/container/swazz). To run:
            ```bash
            docker pull ghcr.io/${{ env.REPO_LC }}:${{ env.DOCKER_TAG }}
            docker run -p 8080:8080 ghcr.io/${{ env.REPO_LC }}:${{ env.DOCKER_TAG }}
            ```

            ### Headless CLI Engine (Binary Only)
            Pushed to [ghcr.io/sech0us3/swazz-cli](https://github.com/SecH0us3/swazz/pkgs/container/swazz-cli). To run fuzzing runs directly:
            ```bash
            docker pull ghcr.io/${{ env.REPO_LC }}-cli:${{ env.DOCKER_TAG }}
            docker run --rm -v $(pwd):/app ghcr.io/${{ env.REPO_LC }}-cli:${{ env.DOCKER_TAG }} --config /app/swazz.config.json
            ```
          files: |
            packages/container/swazz-engine-linux-amd64
            packages/container/swazz-engine-darwin-amd64
            packages/container/swazz-engine-darwin-arm64
            packages/container/swazz-engine-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    name: Build and Push Docker Image
    needs: changes
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up QEMU
        # v3.0.0
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        # v4.1.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Lowercase repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Calculate Docker Tag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DOCKER_TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        # v4.2.0
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "25.9.0"
          cache: "npm"

      - name: Install dependencies and build Web UI
        run: |
          npm install
          npm run build
          mkdir -p packages/container/web
          cp -r packages/web/dist packages/container/web/dist

      - name: Extract metadata (Server)
        id: meta-server
        # v6.0.0
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ghcr.io/${{ env.REPO_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ env.DOCKER_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Extract metadata (CLI)
        id: meta-cli
        # v6.0.0
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ghcr.io/${{ env.REPO_LC }}-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ env.DOCKER_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and export Server to Docker
        # v7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/container
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}:${{ env.DOCKER_TAG }}
          build-args: |
            DOCKER_TAG=${{ env.DOCKER_TAG }}

      - name: Build and export CLI to Docker
        # v7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/container
          file: packages/container/Dockerfile.cli
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}-cli:${{ env.DOCKER_TAG }}
          build-args: |
            DOCKER_TAG=${{ env.DOCKER_TAG }}

      - name: Run Trivy vulnerability scanner on Server
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: "ghcr.io/${{ env.REPO_LC }}:${{ env.DOCKER_TAG }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy vulnerability scanner on CLI
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: "ghcr.io/${{ env.REPO_LC }}-cli:${{ env.DOCKER_TAG }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Build and push Server
        # v7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/container
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          build-args: |
            DOCKER_TAG=${{ env.DOCKER_TAG }}

      - name: Build and push CLI
        # v7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/container
          file: packages/container/Dockerfile.cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cli.outputs.tags }}
          labels: ${{ steps.meta-cli.outputs.labels }}
          build-args: |
            DOCKER_TAG=${{ env.DOCKER_TAG }}

  deploy:
    name: Deploy to Cloudflare
    needs: [changes, docker-release]
    if: |
      always() && github.ref == 'refs/heads/master' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.docker-release.result == 'success' || needs.docker-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "25.9.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build Web UI
        run: |
          npm run build
          mkdir -p packages/container/web
          cp -r packages/web/dist packages/container/web/dist

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run deploy:api
          npm run deploy:web
          npm run deploy:demo
