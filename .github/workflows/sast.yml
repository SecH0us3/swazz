name: SAST

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gosec:
    name: GoSec Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # v4.3.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Go
        # v6.4.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.3'
          cache-dependency-path: packages/container/go.sum
      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.1
      - name: Run GoSec
        working-directory: packages/container
        continue-on-error: true  # exit 1 when findings exist; SARIF upload must still run
        run: |
          gosec -conf ../../.gosec.conf -exclude=G404 -fmt sarif -out gosec.sarif ./...
      - name: Upload SARIF to GitHub Code Scanning
        if: always()  # upload findings even when gosec exits with code 1
        # v4.35.5
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          sarif_file: packages/container/gosec.sarif
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [go]
    steps:
      - name: Checkout repository
        # v4.3.1
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Initialize CodeQL
        # v4.35.5
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        # v4.35.5
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
      - name: Perform CodeQL Analysis
        # v4.35.5
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: "${{ matrix.language }}-analysis"
