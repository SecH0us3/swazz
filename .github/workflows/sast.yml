name: SAST

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.gitignore'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gosec:
    name: GoSec Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # v4.3.1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Go
        # v6.4.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: '1.26.4'
          cache-dependency-path: packages/container/go.sum
      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.1
      - name: Run GoSec
        working-directory: packages/container
        continue-on-error: true  # exit 1 when findings exist; SARIF upload must still run
        run: |
          gosec -conf ../../.gosec.conf -exclude=G404 -fmt sarif -out gosec.sarif ./...
      - name: Upload SARIF to GitHub Code Scanning
        if: always()  # upload findings even when gosec exits with code 1
        # v4.35.5
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          sarif_file: packages/container/gosec.sarif
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [go]
    steps:
      - name: Checkout repository
        # v4.3.1
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Initialize CodeQL
        # v4.35.5
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        # v4.35.5
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a
      - name: Perform CodeQL Analysis
        # v4.37.0
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          category: "${{ matrix.language }}-analysis"
