version: 2
updates:
  # 1. npm Workspaces (Root, packages/web, packages/edge)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"

  # 2. npm Standalone Demo Project
  - package-ecosystem: "npm"
    directory: "/demo"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "demo"

  # 3. Go Modules (Backend Fuzzing Engine)
  - package-ecosystem: "gomod"
    directory: "/packages/container"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"

  # 4. GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
