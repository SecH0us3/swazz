services:
  backend:
    build:
      context: ./packages/container
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SWAZZ_ALLOW_PRIVATE_IPS=true
      - ALLOWED_ORIGIN=*

  frontend:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
